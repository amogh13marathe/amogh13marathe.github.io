<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0ea5e9"/
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow top-right -->
  <ellipse cx="950" cy="120" rx="420" ry="280" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Top label -->
  <rect x="80" y="72" width="260" height="36" rx="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="104" cy="90" r="5" fill="#0ea5e9" opacity="0.9"/>
  <text x="120" y="95" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#7dd3fc" letter-spacing="1">OPEN TO NEW ROLES</text>

  <!-- Name -->
  <text x="80" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Amogh Marathe</text>

  <!-- Title -->
  <text x="80" y="240" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="400" fill="#7dd3fc">Senior Technical Product Manager</text>

  <!-- Tagline -->
  <text x="80" y="286" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="400" fill="#64748b">8 years · API Platforms · Developer Experience · AI Products · Denver, CO</text>

  <!-- Divider -->
  <line x1="80" y1="320" x2="760" y2="320" stroke="#334155" stroke-width="1"/>

  <!-- Metric cards -->
  <!-- Card 1 -->
  <rect x="80" y="348" width="240" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="200" y="398" font-family="'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="800" text-anchor="middle" fill="#3b82f6">$800K</text>
  <text x="200" y="428" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#64748b">New ARR Generated</text>
  <text x="200" y="447" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#64748b">Subscription Renewals API</text>

  <!-- Card 2 -->
  <rect x="340" y="348" width="240" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="460" y="398" font-family="'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="800" text-anchor="middle" fill="#3b82f6">$1.45M</text>
  <text x="460" y="428" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#64748b">Annual Savings</text>
  <text x="460" y="447" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#64748b">AI + Self-Serve Platform</text>

  <!-- Card 3 -->
  <rect x="600" y="348" width="240" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="720" y="398" font-family="'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="800" text-anchor="middle" fill="#3b82f6">50M+</text>
  <text x="720" y="428" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#64748b">Annual API Transactions</text>
  <text x="720" y="447" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#64748b">at &lt;5% Failure Rate</text>

  <!-- Card 4 -->
  <rect x="860" y="348" width="240" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="980" y="398" font-family="'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="800" text-anchor="middle" fill="#3b82f6">80+</text>
  <text x="980" y="428" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#64748b">Global Retail Partners</text>
  <text x="980" y="447" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#64748b">Walmart · Target · Home Depot</text>

  <!-- Bottom URL -->
  <text x="80" y="570" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="400" fill="#475569">amogh13marathe.github.io</text>

  <!-- Bottom right — role chips -->
  <rect x="780" y="554" width="100" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="830" y="572" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle" fill="#7dd3fc">Platform PM</text>

  <rect x="892" y="554" width="90" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="937" y="572" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle" fill="#7dd3fc">API Product</text>

  <rect x="994" y="554" width="126" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="1057" y="572" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle" fill="#7dd3fc">AI / Data PM</text>
</svg>
